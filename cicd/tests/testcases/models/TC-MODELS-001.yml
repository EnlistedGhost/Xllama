id: TC-MODELS-001
name: gpt-oss:20b Inference
suite: models
priority: 1
timeout: 900000
dependencies:
  - TC-RUNTIME-001

steps:
  - name: Pull model
    command: docker exec ollama37 ollama pull gpt-oss:20b
    timeout: 600000
    expectPatterns:
      - "success|already exists|pulling"
    rejectPatterns:
      - "error pulling"
      - "Error:"

  - name: Test inference
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gpt-oss:20b","prompt":"What is 2+2? Answer briefly.","stream":false}' \
        | head -c 2000
    expectPatterns:
      - "response"
    rejectPatterns:
      - "CUBLAS_STATUS"
      - "CUDA error"

  - name: Check GPU memory
    command: docker exec ollama37 nvidia-smi --query-compute-apps=pid,used_memory --format=csv
    expectPatterns:
      - "[0-9]+ MiB"

  - name: Unload model
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gpt-oss:20b","keep_alive":0}'
      echo "Model unloaded"
    expectPatterns:
      - "Model unloaded"

criteria: |
  Validate gpt-oss:20b (~20B params, ~15GB VRAM) runs on K80 (compute 3.7).

  Expected:
  - Model pulls successfully or already exists
  - API returns JSON with "response" field
  - GPU memory is allocated (visible in nvidia-smi)
  - No CUDA/CUBLAS errors in output
  - Model unloads successfully

  Acceptable warnings (NOT errors):
  - "flash attention enabled but not supported by gpu" - K80 does not support
    flash attention, this is a normal fallback warning, NOT an error
