name: Model Pull

on:
  schedule:
    # Saturday — pull remaining models
    - cron: '0 1 * * 6'
    - cron: '0 2 * * 6'
    - cron: '0 3 * * 6'   # catch-up for any missed pulls
  workflow_dispatch:
    inputs:
      model:
        description: "Model to pull (e.g. gemma4:e4b)"
        required: false
        type: string

jobs:
  pull:
    name: Pull Model
    runs-on: self-hosted
    timeout-minutes: 55
    steps:
      - name: Determine which model to pull
        id: select
        run: |
          if [ -n "${{ inputs.model }}" ]; then
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
          else
            # Map schedule time (UTC) to model
            HOUR=$(date -u +%H)
            case "$HOUR" in
              01) MODEL="deepseek-r1:32b" ;;
              02) MODEL="gemma4:e4b" ;;
              03) MODEL="deepseek-r1:32b gemma4:e4b" ;;  # catch-up
              *)  MODEL="" ;;
            esac
            echo "model=$MODEL" >> $GITHUB_OUTPUT
          fi

      - name: Pull models
        if: steps.select.outputs.model != ''
        run: |
          MODELS="${{ steps.select.outputs.model }}"

          if ! curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "::error::ollama server is not reachable"
            exit 1
          fi

          EXISTING=$(curl -s http://localhost:11434/api/tags | jq -r '.models[].name')

          for MODEL in $MODELS; do
            if echo "$EXISTING" | grep -q "^${MODEL}$"; then
              echo "⏭ $MODEL already installed"
              continue
            fi

            echo "⬇ Pulling $MODEL..."
            curl -sf http://localhost:11434/api/pull -d "{\"name\":\"$MODEL\"}" --no-buffer | while read -r line; do
              status=$(echo "$line" | jq -r '.status // empty' 2>/dev/null)
              completed=$(echo "$line" | jq -r '.completed // empty' 2>/dev/null)
              total=$(echo "$line" | jq -r '.total // empty' 2>/dev/null)
              if [ -n "$completed" ] && [ -n "$total" ] && [ "$total" != "0" ]; then
                pct=$((completed * 100 / total))
                printf "\r  %s: %d%%" "$status" "$pct"
              elif [ -n "$status" ]; then
                echo "  $status"
              fi
            done
            echo ""
            echo "✓ $MODEL pulled"
          done

          echo ""
          echo "Installed models:"
          curl -s http://localhost:11434/api/tags | jq -r '.models[] | "\(.name)\t\(.size / 1073741824 * 100 | floor / 100)GB"'
