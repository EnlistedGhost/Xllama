name: Enhancement
description: Improve or modify an existing feature
labels: ["enhancement"]
body:
  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What exists today
    validations:
      required: true
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed Change
      description: What should change and why
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List testable conditions that define "done"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Implementation hints, affected files, or constraints
    validations:
      required: false
