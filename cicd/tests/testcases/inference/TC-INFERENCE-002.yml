id: TC-INFERENCE-002
name: API Inference Test
suite: inference
priority: 2
timeout: 300000
dependencies:
  - TC-INFERENCE-001

steps:
  - name: Test generate endpoint
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:4b","prompt":"What is 2+2? Answer with just the number.","stream":false}' \
        | head -c 1000
    expectPatterns:
      - "response"
    rejectPatterns:
      - "error"
      - "CUBLAS_STATUS"
      - "CUDA error"

  - name: Check GPU memory usage
    command: docker exec ollama37 nvidia-smi --query-compute-apps=pid,used_memory --format=csv
    expectPatterns:
      - "[0-9]+ MiB"

  - name: Unload model after test
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:4b","keep_alive":0}'
      echo "Model unload requested"
    expectPatterns:
      - "Model unload requested"

criteria: |
  Test inference via Ollama REST API /api/generate endpoint.

  Expected:
  - API request returns JSON with "response" field
  - GPU memory is allocated (visible in nvidia-smi)
  - No CUDA/CUBLAS errors in output

  Acceptable warnings (NOT errors):
  - "flash attention enabled but not supported by gpu" - K80 does not support
    flash attention, this is a normal fallback warning, NOT an error

  Tests validate that:
  1. HTTP API works correctly
  2. Model loads correctly into VRAM
  3. CUDA operations work on K80 (compute 3.7)
