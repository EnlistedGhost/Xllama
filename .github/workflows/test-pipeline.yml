name: Full Test Pipeline

on:
  workflow_dispatch:
    inputs:
      judge_mode:
        description: "Test judge mode"
        required: false
        default: "dual"
        type: choice
        options:
          - "simple"
          - "dual"
      judge_model:
        description: "LLM model for judging (if dual mode)"
        required: false
        default: "gemma3:12b"
        type: string

jobs:
  build:
    name: Build Tests
    uses: ./.github/workflows/test-build.yml
    with:
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}

  runtime:
    name: Runtime Tests
    needs: build
    uses: ./.github/workflows/test-runtime.yml
    with:
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}

  inference:
    name: Inference Tests
    needs: runtime
    uses: ./.github/workflows/test-inference.yml
    with:
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}

  models:
    name: Models Tests
    needs: inference
    uses: ./.github/workflows/test-models.yml
    with:
      judge_mode: ${{ inputs.judge_mode }}
      judge_model: ${{ inputs.judge_model }}
