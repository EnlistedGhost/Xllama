id: TC-MODELS-013
name: "ministral-3:3b Inference"
suite: models
priority: 2
timeout: 600000
dependencies:
  - TC-RUNTIME-001
testlink_id: ""
issue: ""
goal: "Verify ministral-3:3b loads and runs inference on K80"

steps:
  - name: Pull model
    command: |
      curl -sf http://localhost:11434/api/pull \
        -d '{"name":"ministral-3:3b"}' --no-buffer \
        | tail -1
    timeout: 300000
    expectPatterns:
      - "success"
    rejectPatterns:
      - "error"

  - name: Test inference
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"ministral-3:3b","prompt":"What is 2+2? Answer briefly.","stream":false}' \
        | head -c 2000
    expectPatterns:
      - "response"
    rejectPatterns:
      - "CUBLAS_STATUS"
      - "CUDA error"

  - name: Unload model
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"ministral-3:3b","keep_alive":0}'
      echo "Model unloaded"
    expectPatterns:
      - "Model unloaded"

criteria: |
  Verify ministral-3:3b loads and runs inference on K80.

  Expected:
  - Model pulls successfully
  - API returns JSON with "response" field
  - No CUDA/CUBLAS errors
  - Model unloads successfully
