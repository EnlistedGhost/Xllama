id: TC-MODELS-008
name: gemma3:4b Inference
suite: models
priority: 4
timeout: 600000
dependencies: []
testlink_id: ollama37-29
issue: 55
goal: "Validate gemma3:4b runs on K80 compute 3.7 (single GPU)"

steps:
  - name: Test inference
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:4b","prompt":"What is 2+2? Answer briefly.","stream":false}' \
        | head -c 2000
    expectPatterns:
      - "response"
    rejectPatterns:
      - "CUBLAS_STATUS"
      - "CUDA error"

  - name: Check GPU memory
    command: docker exec ollama37 nvidia-smi --query-compute-apps=pid,used_memory --format=csv
    expectPatterns:
      - "[0-9]+ MiB"

  - name: Unload model
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:4b","keep_alive":0}'
      echo "Model unloaded"
    expectPatterns:
      - "Model unloaded"

criteria: |
  Validate gemma3:4b (~3GB VRAM, single GPU) runs on K80 (compute 3.7).
  Small model baseline for gemma3 architecture.
  Prerequisite: Model must be pre-pulled before running this test.

  Expected:
  - API returns JSON with "response" field containing coherent text
  - GPU memory is allocated (visible in nvidia-smi)
  - No CUDA/CUBLAS errors in output
  - Model unloads successfully

  Acceptable warnings (NOT errors):
  - "flash attention enabled but not supported by gpu" - K80 does not support
    flash attention, this is a normal fallback warning, NOT an error
