name: Build Verification

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: "Ollama version to build"
        required: false
        default: ""
        type: string
      judge_mode:
        description: "Test judge mode"
        required: false
        default: "dual"
        type: choice
        options:
          - "simple"
          - "dual"
      judge_model:
        description: "LLM model for judging (if dual mode)"
        required: false
        default: "gemma3:12b"
        type: string
  workflow_call:
    inputs:
      ollama_version:
        description: "Ollama version to build"
        required: false
        default: ""
        type: string
      judge_mode:
        description: "Test judge mode (simple, dual)"
        required: false
        default: "dual"
        type: string
      judge_model:
        description: "LLM model for judging"
        required: false
        default: "gemma3:12b"
        type: string
    outputs:
      result:
        description: "Build test result"
        value: ${{ jobs.build.outputs.result }}

jobs:
  build:
    name: Build Verification
    runs-on: self-hosted
    environment: cicd-1
    env:
      OLLAMA_VERSION: ${{ inputs.ollama_version || vars.OLLAMA_VERSION || '0.0.0' }}
    outputs:
      result: ${{ steps.build-tests.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test runner dependencies
        run: cd cicd/tests && npm ci

      - name: Run build tests
        id: build-tests
        run: |
          cd cicd/tests

          # Build judge flags based on input
          JUDGE_FLAGS=""
          if [ "${{ inputs.judge_mode }}" = "simple" ]; then
            JUDGE_FLAGS="--no-llm"
          else
            # dual mode (default) - both judges run
            JUDGE_FLAGS="--judge-model ${{ inputs.judge_model || 'gemma3:12b' }}"
          fi

          echo "Ollama version: $OLLAMA_VERSION"
          echo "Judge mode: ${{ inputs.judge_mode || 'dual' }}"
          echo "Judge flags: $JUDGE_FLAGS"

          # Run tests with JSON output
          npx tsx src/cli.ts run --suite build $JUDGE_FLAGS --format json > /tmp/build-results.json || true

          echo "--- JSON Results ---"
          cat /tmp/build-results.json

      - name: Check test results
        run: |
          FAILED=$(jq '.failed' /tmp/build-results.json)
          echo "Failed tests: $FAILED"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED build test(s) failed"
            exit 1
          fi

      - name: Upload build results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-test-results
          path: /tmp/build-results.json
