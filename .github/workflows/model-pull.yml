name: Model Pull

on:
  schedule:
    # Pull one model per hour starting at 1:00 AM UTC+8 (17:00 UTC)
    # Night of 2026-04-09 only — remove schedule after all models are pulled
    - cron: '0 17 * * 2'   # 01:00 UTC+8 — gemma4:e4b
    - cron: '0 18 * * 2'   # 02:00 UTC+8 — gemma4:26b
    - cron: '0 19 * * 2'   # 03:00 UTC+8 — deepseek-r1:32b
    - cron: '0 20 * * 2'   # 04:00 UTC+8 — qwen3.5:27b
    - cron: '0 21 * * 2'   # 05:00 UTC+8 — qwen3-vl:8b
    - cron: '0 22 * * 2'   # 06:00 UTC+8 — qwen3-vl:30b
  workflow_dispatch:
    inputs:
      model:
        description: "Model to pull (e.g. gemma4:e4b)"
        required: false
        type: string

jobs:
  pull:
    name: Pull Model
    runs-on: self-hosted
    timeout-minutes: 55
    steps:
      - name: Determine which model to pull
        id: select
        run: |
          if [ -n "${{ inputs.model }}" ]; then
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
          else
            # Map schedule hour (UTC) to model
            HOUR=$(date -u +%H)
            case "$HOUR" in
              17) MODEL="gemma4:e4b" ;;
              18) MODEL="gemma4:26b" ;;
              19) MODEL="deepseek-r1:32b" ;;
              20) MODEL="qwen3.5:27b" ;;
              21) MODEL="qwen3-vl:8b" ;;
              22) MODEL="qwen3-vl:30b" ;;
              *)  MODEL="" ;;
            esac
            echo "model=$MODEL" >> $GITHUB_OUTPUT
          fi

      - name: Check if model needs pulling
        id: check
        if: steps.select.outputs.model != ''
        run: |
          MODEL="${{ steps.select.outputs.model }}"
          echo "Target: $MODEL"

          if ! curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "::error::ollama server is not reachable"
            exit 1
          fi

          EXISTING=$(curl -s http://localhost:11434/api/tags | jq -r '.models[].name')
          if echo "$EXISTING" | grep -q "^${MODEL}$"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭ $MODEL already installed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "⬇ $MODEL needs pulling"
          fi

      - name: Pull model
        if: steps.select.outputs.model != '' && steps.check.outputs.skip != 'true'
        run: |
          MODEL="${{ steps.select.outputs.model }}"
          echo "Pulling $MODEL..."
          curl -sf http://localhost:11434/api/pull -d "{\"name\":\"$MODEL\"}" --no-buffer | while read -r line; do
            status=$(echo "$line" | jq -r '.status // empty' 2>/dev/null)
            completed=$(echo "$line" | jq -r '.completed // empty' 2>/dev/null)
            total=$(echo "$line" | jq -r '.total // empty' 2>/dev/null)
            if [ -n "$completed" ] && [ -n "$total" ] && [ "$total" != "0" ]; then
              pct=$((completed * 100 / total))
              printf "\r  %s: %d%%" "$status" "$pct"
            elif [ -n "$status" ]; then
              echo "  $status"
            fi
          done
          echo ""
          echo "✓ $MODEL pulled"

      - name: Verify
        if: steps.select.outputs.model != ''
        run: |
          echo "Installed models:"
          curl -s http://localhost:11434/api/tags | jq -r '.models[] | "\(.name)\t\(.size / 1073741824 * 100 | floor / 100)GB"'
