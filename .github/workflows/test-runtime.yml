name: Runtime Tests

on:
  workflow_dispatch:
    inputs:
      judge_mode:
        description: "Test judge mode"
        required: false
        default: "dual"
        type: choice
        options:
          - "simple"
          - "dual"
      judge_model:
        description: "LLM model for judging (if dual mode)"
        required: false
        default: "gemma3:12b"
        type: string
  workflow_call:
    inputs:
      judge_mode:
        description: "Test judge mode (simple, dual)"
        required: false
        default: "dual"
        type: string
      judge_model:
        description: "LLM model for judging"
        required: false
        default: "gemma3:12b"
        type: string
    outputs:
      result:
        description: "Runtime test result"
        value: ${{ jobs.runtime.outputs.result }}

jobs:
  runtime:
    name: Container & Runtime Tests
    runs-on: self-hosted
    environment: cicd-1
    outputs:
      result: ${{ steps.runtime-tests.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test runner dependencies
        run: cd cicd/tests && npm ci

      - name: Run runtime tests
        id: runtime-tests
        run: |
          cd cicd/tests

          # Build judge flags based on input
          JUDGE_FLAGS=""
          if [ "${{ inputs.judge_mode }}" = "simple" ]; then
            JUDGE_FLAGS="--no-llm"
          else
            # dual mode (default) - both judges run
            JUDGE_FLAGS="--judge-model ${{ inputs.judge_model || 'gemma3:12b' }}"
          fi

          echo "Judge mode: ${{ inputs.judge_mode || 'dual' }}"
          echo "Judge flags: $JUDGE_FLAGS"

          # Run tests with JSON output
          npx tsx src/cli.ts run --suite runtime $JUDGE_FLAGS --format json > /tmp/runtime-results.json || true

          echo "--- JSON Results ---"
          cat /tmp/runtime-results.json

      - name: Check test results
        run: |
          FAILED=$(jq '.summary.failed' /tmp/runtime-results.json)
          echo "Failed tests: $FAILED"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED runtime test(s) failed"
            exit 1
          fi

      - name: Upload runtime results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-test-results
          path: /tmp/runtime-results.json
