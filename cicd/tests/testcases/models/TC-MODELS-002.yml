id: TC-MODELS-002
name: gemma3:27b Inference
suite: models
priority: 2
timeout: 900000
dependencies: []
goal: "Validate gemma3:27b (~27B params) runs on K80 compute 3.7"

steps:
  - name: Test inference
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:27b","prompt":"What is 2+2? Answer briefly.","stream":false}' \
        | head -c 2000
    expectPatterns:
      - "response"
    rejectPatterns:
      - "CUBLAS_STATUS"
      - "CUDA error"

  - name: Check GPU memory
    command: docker exec ollama37 nvidia-smi --query-compute-apps=pid,used_memory --format=csv
    expectPatterns:
      - "[0-9]+ MiB"

  - name: Unload model
    command: |
      curl -s http://localhost:11434/api/generate \
        -d '{"model":"gemma3:27b","keep_alive":0}'
      echo "Model unloaded"
    expectPatterns:
      - "Model unloaded"

criteria: |
  Validate gemma3:27b (~27B params, ~18GB VRAM) runs on K80 (compute 3.7).
  Prerequisite: Model must be pre-pulled before running this test.

  Expected:
  - API returns JSON with "response" field
  - GPU memory is allocated (visible in nvidia-smi)
  - No CUDA/CUBLAS errors in output
  - Model unloads successfully

  Acceptable warnings (NOT errors):
  - "flash attention enabled but not supported by gpu" - K80 does not support
    flash attention, this is a normal fallback warning, NOT an error
