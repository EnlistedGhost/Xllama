id: TC-BUILD-001
name: Builder Image Verification
suite: build
priority: 1
timeout: 60000
dependencies: []
goal: "Verify builder Docker image contains required build tools (CUDA 11.4, GCC 10, Go)"

steps:
  - name: Check builder image exists
    command: docker images ollama37-builder:latest --format '{{.Repository}}:{{.Tag}}'
    expectPatterns:
      - "ollama37-builder:latest"

  - name: Verify CUDA toolkit installed
    command: docker run --rm ollama37-builder:latest nvcc --version
    expectPatterns:
      - "Cuda compilation tools"
      - "release 11\\.4"

  - name: Verify GCC version
    command: docker run --rm ollama37-builder:latest gcc --version
    expectPatterns:
      - "gcc.*10"

  - name: Verify Go version
    command: docker run --rm ollama37-builder:latest go version
    expectPatterns:
      - "go1\\.2[0-9]"

criteria: |
  Verify the ollama37-builder Docker image exists and contains required build tools:
  - CUDA toolkit 11.4 (nvcc --version shows "release 11.4")
  - GCC 10.x (gcc --version shows "gcc (GCC) 10")
  - Go 1.20+ (go version shows "go1.2x")
