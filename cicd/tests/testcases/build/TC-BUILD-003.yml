id: TC-BUILD-003
name: Image Size Validation
suite: build
priority: 2
timeout: 60000
dependencies:
  - TC-BUILD-001
  - TC-BUILD-002

steps:
  - name: Check builder image size
    command: "size=$(docker images ollama37-builder:latest --format '{{.Size}}'); echo \"$size\"; numfmt --from=iec \"${size%B}\" | awk '{gb=$1/1073741824; if (gb >= 20 && gb <= 35) print \"SIZE_OK\"; else print \"SIZE_FAIL: \" gb \"GB\"}'"
    expectPatterns:
      - "SIZE_OK"

  - name: Check runtime image size
    command: "size=$(docker images ollama37:latest --format '{{.Size}}'); echo \"$size\"; numfmt --from=iec \"${size%B}\" | awk '{gb=$1/1073741824; if (gb >= 1 && gb <= 3) print \"SIZE_OK\"; else print \"SIZE_FAIL: \" gb \"GB\"}'"
    expectPatterns:
      - "SIZE_OK"

criteria: |
  Verify Docker image sizes are within expected range.

  Expected:
  - Builder image (ollama37-builder:latest): between 20GB and 35GB
  - Runtime image (ollama37:latest): between 1GB and 3GB (multi-stage build)
