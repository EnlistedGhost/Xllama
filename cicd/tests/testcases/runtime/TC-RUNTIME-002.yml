id: TC-RUNTIME-002
name: GPU Detection
suite: runtime
priority: 2
timeout: 120000
dependencies:
  - TC-RUNTIME-001

steps:
  - name: Check nvidia-smi inside container
    command: docker exec ollama37 nvidia-smi
    expectPatterns:
      - "Tesla K80"
      - "470\\."
    rejectPatterns:
      - "NVIDIA-SMI has failed"
      - "No devices were found"

  - name: Check CUDA libraries
    command: docker exec ollama37 ldconfig -p | grep -i cuda | head -5
    expectPatterns:
      - "cuda"

  - name: Ensure UVM device exists
    command: |
      if [ ! -e /dev/nvidia-uvm ]; then
        echo "Creating UVM device..."
        sudo nvidia-modprobe -u -c=0 || true
      fi
      ls -la /dev/nvidia-uvm 2>/dev/null && echo "UVM device exists" || echo "UVM device not found"
    expectPatterns:
      - "nvidia-uvm"

  - name: Check Ollama GPU detection in logs
    command: docker compose -f /home/jack/src/ollama37/docker/docker-compose.yml logs 2>&1 | grep -i "inference compute" | tail -5
    expectPatterns:
      - "library=CUDA"
      - "compute=3\\.7"
    rejectPatterns:
      - "library=cpu"

criteria: |
  Verify Tesla K80 GPU is detected by both nvidia-smi AND Ollama CUDA runtime.

  nvidia-smi should show:
  - Tesla K80 GPU(s)
  - Driver 470.x

  Ollama logs should show:
  - library=CUDA (NOT library=cpu)
  - compute=3.7 (K80 compute capability)
  - description=Tesla K80

  If logs show "library=cpu", the GPU detection has failed.
